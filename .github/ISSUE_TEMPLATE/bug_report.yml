name: Bug report
description: Report a reproducible problem in Agent Toolkit
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for maintainers to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Use a minimal sequence of commands, requests, or UI actions.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Send ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include logs or screenshots when useful. Redact secrets.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - server
        - agentic
        - widget
        - cli
        - core/types
        - ingest pipeline
        - Docker/deployment
        - documentation
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Node 22.x, pnpm 9.x, macOS/Linux, Docker version..."
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else that helps narrow the root cause.
