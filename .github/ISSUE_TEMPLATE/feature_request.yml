name: Feature request
description: Propose an improvement for Agent Toolkit
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, API, command, provider, or docs change you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - server
        - agentic
        - widget
        - cli
        - core/types
        - ingest pipeline
        - Docker/deployment
        - documentation
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?
  - type: textarea
    id: production
    attributes:
      label: Production considerations
      description: Security, migration, deployment, observability, or compatibility concerns.
