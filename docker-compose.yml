services:
  postgres:
    image: postgres:17-alpine
    env_file:
      - path: .env.prod
        required: true
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\""]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  server:
    build:
      context: .
      target: server-runtime
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - path: .env.prod
        required: true
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      langgraph:
        condition: service_healthy
    networks:
      - internal
      - web

  langgraph:
    build:
      context: .
      target: agentic-runtime
    ports:
      - "${LANGGRAPH_PORT:-2024}:2024"
    env_file:
      - path: .env.prod
        required: true
    environment:
      PORT: "2024"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:2024/health >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
      - web

  langstudio:
    build:
      context: .
      target: agentic-studio
    ports:
      - "${LANGSTUDIO_PORT:-2025}:2025"
    env_file:
      - path: .env.prod
        required: true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:2025/ok >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - web

volumes:
  pgdata:
  redisdata:

networks:
  internal:
    driver: bridge
  web:
    driver: bridge
